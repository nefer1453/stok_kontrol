<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1f7a3a" />
  <title>stok_kontrol</title>

  <style>
    :root{
      --bg: #ffffff;
      --card: #f6fff7;
      --text: #0b1b10;
      --muted:#3a5b45;
      --green:#1f7a3a;          /* çimen yeşili */
      --green2:#2ea44f;
      --red:#d93025;
      --border:#cfe7d6;
      --shadow: 0 10px 30px rgba(0,0,0,.10);
      --r: 16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background: var(--bg);
      color: var(--text);
    }

    /* HEADER */
    header{
      position: sticky;
      top:0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(31,122,58,.95), rgba(31,122,58,.88));
      color:#fff;
      padding: 12px 12px 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      backdrop-filter: blur(10px);
    }
    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .iconbtn{
      width:44px;height:44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.12);
      color:#fff;
      display:grid;
      place-items:center;
      font-size: 20px;
    }
    .titlepill{
      flex:1;
      height:44px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      padding: 0 12px;
      font-weight: 700;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }
    .searchwrap{
      margin-top: 10px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .search{
      flex:1;
      height:44px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.12);
      color:#fff;
      padding: 0 12px;
      outline:none;
      font-size: 15px;
    }
    .search::placeholder{ color: rgba(255,255,255,.75); }

    main{
      padding: 14px;
      padding-bottom: 110px; /* alt fab alanı */
      max-width: 900px;
      margin: 0 auto;
    }

    /* CARDS/LISTS */
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-weight:600;
      font-size: 13px;
    }
    .chip strong{color:var(--text)}
    .btn{
      border:none;
      border-radius: 14px;
      height:44px;
      padding: 0 14px;
      font-weight: 700;
      color:#fff;
      background: var(--green);
    }
    .btn.ghost{
      background: transparent;
      color: var(--green);
      border: 1px solid var(--border);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .card{
      border:1px solid var(--border);
      background: var(--card);
      border-radius: var(--r);
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
    }
    .cardTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .name{
      font-size: 18px;
      font-weight: 900;
      letter-spacing:.2px;
    }
    .qty{
      font-size: 14px;
      font-weight:800;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      color: var(--green);
      background: #fff;
      white-space:nowrap;
    }
    .meta{
      margin-top: 8px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .tag{
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background:#fff;
      color: var(--muted);
    }
    .tag.red{ color: var(--red); border-color: rgba(217,48,37,.25); }
    .tag.green{ color: var(--green); border-color: rgba(31,122,58,.25); }
    .tag.dark{ color:#0b1b10; }

    .actionsRow{
      margin-top: 10px;
      display:flex;
      justify-content:flex-start;
      gap:10px;
    }

    /* Floating Share FAB (sağ-alt, o anki listeye göre) */
    #shareFab{
      position: fixed;
      right: 14px;
      bottom: 16px;
      z-index: 15;
      height: 56px;
      border-radius: 18px;
      padding: 0 16px;
      background: linear-gradient(180deg, var(--green2), var(--green));
      color:#fff;
      border:none;
      font-weight: 900;
      box-shadow: var(--shadow);
      display:flex;
      align-items:center;
      gap:10px;
    }
    #shareFab small{opacity:.9;font-weight:700}

    /* Drawer */
    #drawerBackdrop{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      z-index: 30;
      display:none;
    }
    #drawer{
      position: fixed;
      top:0; left:0;
      height:100%;
      width: 290px;
      background: #ffffff;
      border-right: 1px solid var(--border);
      z-index: 31;
      transform: translateX(-100%);
      transition: transform .18s ease;
      padding: 12px;
    }
    #drawer.open{ transform: translateX(0); }
    #drawerBackdrop.open{ display:block; }
    .dHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 8px;
    }
    .dTitle{
      font-weight: 1000;
      color: var(--green);
    }
    .dItem{
      width:100%;
      text-align:left;
      height: 46px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-weight: 900;
      padding: 0 12px;
      margin-top: 10px;
    }

    /* Modal */
    #modalBackdrop{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      z-index: 50;
      display:none;
    }
    #modal{
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      width: min(640px, calc(100vw - 22px));
      max-height: 92vh;          /* <<< taşmayı kes */
      overflow: auto;            /* <<< kendi içinde scroll */
      background: #fff;
      border:1px solid var(--border);
      border-radius: 20px;
      z-index: 51;
      box-shadow: var(--shadow);
      display:none;
      padding-bottom: 96px;      /* <<< Kaydet için alt güvenli alan */
    }
    .mHead{
      position: sticky;
      top:0;
      background:#fff;
      z-index: 2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding: 12px;
      border-bottom:1px solid var(--border);
    }
    .mHead .ttl{
      font-weight: 1000;
      color: var(--green);
      font-size: 18px;
    }
    .mBody{ padding: 12px; }
    .field{
      margin-top: 12px;
    }
    .field label{
      display:block;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .inp, select, textarea{
      width:100%;
      height: 48px;
      border-radius: 16px;
      border:1px solid var(--border);
      padding: 0 12px;
      font-size: 16px;
      outline:none;
      background: #fff;
    }
    textarea{
      height: 92px;
      padding: 10px 12px;
      resize: vertical;
    }
    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .wheel{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 10px;
      border:1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
    }
    .wheel select{ height: 56px; font-weight: 900; }
    .hint{
      margin-top: 10px;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
    }

    .mActions{
      position: sticky;
      bottom: 0;
      z-index: 3;
      background: linear-gradient(180deg, rgba(255,255,255,.86), #fff);
      border-top: 1px solid var(--border);
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display:flex;
      gap:10px;
    }
    .mActions .btn{ flex:1; }

    /* <<< FIX A: Modal açıkken Paylaş FAB gizle */
    body.modal-open #shareFab{ display:none !important; }

    /* Blink */
    @keyframes blinkRed { 0%,49%{outline:2px solid rgba(217,48,37,.0)} 50%,100%{outline:2px solid rgba(217,48,37,.55)} }
    @keyframes blinkGreen { 0%,49%{outline:2px solid rgba(31,122,58,.0)} 50%,100%{outline:2px solid rgba(31,122,58,.55)} }
    .blink-red{ animation: blinkRed 2s linear infinite; }
    .blink-green{ animation: blinkGreen 2s linear infinite; }

    /* Small toast */
    #toast{
      position: fixed;
      left: 50%;
      bottom: 86px;
      transform: translateX(-50%);
      background: #0b1b10;
      color:#fff;
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 800;
      z-index: 80;
      display:none;
      box-shadow: var(--shadow);
      max-width: min(520px, calc(100vw - 24px));
      text-align:center;
    }

    @media (max-width:520px){
      .grid2{ grid-template-columns: 1fr; }
      #shareFab{ left: 14px; right: 14px; justify-content:center; }
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <button class="iconbtn" id="btnMenu" aria-label="Menü">☰</button>
      <div class="titlepill" id="screenTitle">Ekran: Ana</div>
      <button class="iconbtn" id="btnSearch" aria-label="Ara">🔎</button>
    </div>
    <div class="searchwrap" id="searchWrap" style="display:none;">
      <input class="search" id="q" placeholder="Ürün ara..." />
      <button class="btn ghost" id="btnClear">Temizle</button>
    </div>
  </header>

  <main>
    <div class="row" id="chips"></div>
    <div class="list" id="list"></div>
  </main>

  <button id="shareFab" title="Bu ekrandaki listeyi paylaş">
    ↗ Paylaş <small id="shareHint">Ana</small>
  </button>

  <!-- Drawer -->
  <div id="drawerBackdrop"></div>
  <aside id="drawer">
    <div class="dHead">
      <div class="dTitle">stok_kontrol</div>
      <button class="iconbtn" id="btnDrawerClose" aria-label="Kapat">✕</button>
    </div>

    <button class="dItem" data-nav="dashboard">🏠 Ana (Uyarılar)</button>
    <button class="dItem" data-nav="all">📦 Tüm Ürünler</button>
    <button class="dItem" data-nav="skt10">⏳ SKT: Son 10 Gün</button>
    <button class="dItem" data-nav="removed">🗑️ Kaldırılanlar</button>

    <button class="dItem" id="btnAddFromMenu">＋ Ürün / Parti Ekle</button>
  </aside>

  <!-- Modal -->
  <div id="modalBackdrop"></div>
  <section id="modal" role="dialog" aria-modal="true">
    <div class="mHead">
      <div class="ttl" id="modalTitle">Ürün / Parti</div>
      <button class="btn ghost" id="btnModalClose">Kapat</button>
    </div>

    <div class="mBody">
      <div class="field">
        <label>Mod</label>
        <select id="mode" class="inp">
          <option value="new">Yeni ürün + parti</option>
          <option value="add">Var olan ürüne parti ekle</option>
        </select>
      </div>

      <div class="field">
        <label>Ürün adı</label>
        <input id="name" class="inp" placeholder="Örn: DANET SUCUK" />
      </div>

      <div class="grid2">
        <div class="field">
          <label>Adet</label>
          <input id="qty" class="inp" inputmode="numeric" placeholder="0" />
        </div>

        <div class="field">
          <label>SKT (kayan tarih) — ay NUMARA</label>
          <div class="wheel" id="w_skt"></div>
          <div class="hint">İpucu: SKT’de ay adı yok, 01-12 numara.</div>
        </div>
      </div>

      <div class="field">
        <label>Temin</label>
        <select id="temin" class="inp">
          <option value="Sipariş">Sipariş</option>
          <option value="Dağılım">Dağılım</option>
          <option value="Diğer">Diğer</option>
        </select>
      </div>

      <div class="field">
        <label>Dağılım nedeni</label>
        <select id="distReason" class="inp">
          <option value="Inserte hazırlık">Inserte hazırlık</option>
          <option value="Merkez dağılım">Merkez dağılım</option>
          <option value="Şube dağılım">Şube dağılım</option>
          <option value="Diğer">Diğer</option>
        </select>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Insert adı</label>
          <input id="insertName" class="inp" placeholder="Örn: 14 Şubat" />
        </div>
        <div class="field">
          <label>Insert tarihi (kayan) — ay isim olabilir</label>
          <div class="wheel" id="w_insert"></div>
        </div>
      </div>

      <div class="field">
        <label>30 gün kala fiyat iste (isteğe bağlı)</label>
        <select id="price30" class="inp">
          <option value="0">Hayır</option>
          <option value="1">Evet (SKT’ye 30 gün kala ana ekranda yeşil yanıp sön)</option>
        </select>
      </div>

      <div class="field">
        <label>Not</label>
        <textarea id="note" placeholder="Ek bilgi..."></textarea>
      </div>

      <div class="hint" id="flowHint">
        Akış: Ürün adı → Adet → (Kaydet) → kayıt oluşur. (Modal açıkken Paylaş butonu gizlenir.)
      </div>
    </div>

    <div class="mActions">
      <button class="btn ghost" id="btnDelete" style="display:none;">Kaldır</button>
      <button class="btn" id="btnSave">Kaydet</button>
    </div>
  </section>

  <div id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
